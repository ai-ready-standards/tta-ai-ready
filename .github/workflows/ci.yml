name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: AI 레디 패키지 자동 검증
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: pip — pyproject.toml / requirements.txt 추가 후 활성화

      - name: Install validator
        run: |
          python -m pip install --upgrade pip
          pip install -e tools/validator/

      - name: 1. 유효 예시 검증 (M 위반 0건이어야 함)
        run: |
          tta-validator \
            standards/P-01-research-data/examples/valid/ \
            --shapes-dir standards/P-01-research-data/shapes \
            --ci

      - name: 2. 음성 테스트 (의도된 M 위반 발생해야 함)
        run: |
          tta-validator \
            standards/P-01-research-data/examples/invalid/ \
            --shapes-dir standards/P-01-research-data/shapes \
            --expect-fail

  lint:
    name: 코드 린트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff
      - name: Ruff
        run: ruff check tools/ || echo "(린트 경고 — 후속 PR에서 정리)"
