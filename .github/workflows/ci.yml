name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: AI 레디 패키지 자동 검증
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: pip — pyproject.toml / requirements.txt 추가 후 활성화

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          # Validator 도구 (WBS C-10) 완성 후 교체
          pip install pyshacl rdflib pyld pytest

      - name: 1. RDF 문법 검증
        run: |
          echo "RDF 문법 검증 — pySHACL/rdflib 기반"
          # find standards profiles -name '*.ttl' -exec python -c "import sys, rdflib; g=rdflib.Graph(); g.parse(sys.argv[1])" {} \;
          echo "(파일럿 산출물 추가 시 활성화)"

      - name: 2. SHACL 적합성 검증
        run: |
          echo "SHACL 적합성 검증 — pySHACL"
          # for shape in $(find standards -name 'shapes/*.ttl'); do pyshacl ...; done
          echo "(파일럿 산출물 추가 시 활성화)"

      - name: 3. JSON-LD @context 유효성
        run: |
          echo "JSON-LD @context 유효성 — pyld"
          # find standards -name '*.jsonld' -exec ...
          echo "(파일럿 산출물 추가 시 활성화)"

      - name: 4. Python 단위 테스트
        run: |
          echo "Python 단위 테스트 — pytest"
          # pytest tools/validator/tests/ --cov=tools/validator --cov-fail-under=80
          echo "(검증 도구 완성 후 활성화)"

      - name: 5. 예시 데이터셋 로딩
        run: |
          echo "예시 데이터셋 로딩 테스트"
          # python -m tools.validator load-examples standards/
          echo "(파일럿 산출물 추가 시 활성화)"

  lint:
    name: 코드 린트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff
      - name: Ruff
        run: ruff check . || echo "(Python 코드 추가 후 엄격 모드로 전환)"
