name: PR preview cleanup

# PR이 닫히면 (머지·취소 무관) gh-pages 브랜치의 pr-<번호>/ 폴더를 삭제하고
# PR에 정리 코멘트를 게시한다.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-preview:
    name: gh-pages /pr-N/ 폴더 삭제
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory if exists
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            rm -rf "$PR_DIR"
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                add -A
            if ! git diff --cached --quiet; then
              git -c user.name="github-actions[bot]" \
                  -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                  commit -m "Cleanup preview for PR #${{ github.event.pull_request.number }}"
              git push
              echo "removed=true" >> $GITHUB_ENV
            else
              echo "removed=false" >> $GITHUB_ENV
            fi
          else
            echo "Directory $PR_DIR not found — skipping"
            echo "removed=false" >> $GITHUB_ENV
          fi

      - name: Post cleanup notice on PR
        if: env.removed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-cleanup -->';
            const body = [
              marker,
              '',
              '🧹 PR preview 사이트가 제거되었습니다 (PR closed).',
              '',
              '_본 코멘트는 자동 생성됩니다 — `pages-preview-cleanup.yml` 워크플로우가 관리._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
