name: PR preview (mkdocs)

# PR이 등록·갱신될 때 사이트를 빌드하여 gh-pages 브랜치의
# pr-<번호>/ 하위 디렉토리에 푸시한다. 빌드 후 PR에 미리보기 URL 코멘트를 자동 게시.
#
# Preview URL: https://<owner>.github.io/<repo>/pr-<번호>/

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
      - ".github/workflows/pages-preview.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-deploy-preview:
    name: PR preview 빌드 + gh-pages /pr-N/ 푸시
    runs-on: ubuntu-latest
    # fork에서 온 PR은 secrets.GITHUB_TOKEN 쓰기 권한이 제한되어 푸시 불가.
    # 같은 저장소 내 브랜치 PR만 preview 생성.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mkdocs-material pymdown-extensions

      - name: Override site_url for preview subpath
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/"
          sed -i.bak "s|^site_url:.*|site_url: ${PREVIEW_URL}|" mkdocs.yml
          echo "site_url overridden to: ${PREVIEW_URL}"
          grep "^site_url:" mkdocs.yml

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: false
          enable_jekyll: false
          commit_message: "Preview PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.head.sha }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Post or update preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.payload.pull_request.number}/`;
            const marker = '<!-- pr-preview-comment -->';
            const body = [
              marker,
              '',
              '📖 **PR preview 사이트가 배포되었습니다**',
              '',
              `🔗 ${previewUrl}`,
              '',
              '- mkdocs-material 디자인이 적용된 실제 사이트로 변경 결과를 확인할 수 있습니다',
              '- PR이 닫히면 자동으로 제거됩니다',
              '- 새 커밋이 푸시될 때마다 본 코멘트가 갱신됩니다',
              '',
              '_본 코멘트는 자동 생성됩니다 — `pages-preview.yml` 워크플로우가 관리._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing preview comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.info('Created new preview comment');
            }
