name: Deploy MkDocs site (main)

# main 브랜치 빌드 결과를 gh-pages 브랜치 root에 게시한다.
# PR preview는 같은 gh-pages 브랜치의 pr-N/ 하위 디렉토리를 사용하므로
# keep_files: true 로 PR preview 폴더를 보존한다.
#
# 본 워크플로우가 작동하려면 GitHub repo Settings → Pages →
# "Build and deployment" Source 가 "Deploy from a branch" → gh-pages /(root)
# 으로 설정되어 있어야 한다.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 빌드 + gh-pages 푸시 (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          # PR preview 폴더(pr-N/)를 보존하기 위해 keep_files: true.
          # 단, 이 옵션만으로는 main 빌드가 추가만 가능하므로 root 갱신을 위해
          # destination_dir 미사용 (root 직접 갱신).
          keep_files: true
          enable_jekyll: false
          commit_message: "Deploy main: ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
