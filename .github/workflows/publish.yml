name: Publish tta-validator to TestPyPI

# 태그(예: v0.1.0)를 푸시하면 TestPyPI에 자동 배포한다.
# 정식 PyPI 배포는 PyPI 계정 등록 후 environment를 'pypi'로 바꾸고
# repository-url을 https://upload.pypi.org/legacy/ 로 변경하면 된다.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # PyPI Trusted Publisher용

jobs:
  build:
    name: 패키지 빌드
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        working-directory: tools/validator
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: tools/validator/dist/

  publish-testpypi:
    name: TestPyPI 배포
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tta-ai-ready-validator
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
